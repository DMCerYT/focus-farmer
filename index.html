<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Focus Farmer</title>
  <style>
    :root {
      --bg: #f7f2e8;
      --card: #fffaf2;
      --ink: #2d261f;
      --muted: #75624f;
      --accent: #2f7a3f;
      --accent-2: #d46b1f;
      --danger: #b63d2e;
      --line: #e8dac4;
      --shadow: 0 10px 24px rgba(61, 44, 23, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Avenir Next", "Nunito", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, #fff9ef 0, transparent 40%),
        radial-gradient(circle at 90% 15%, #ffe8c2 0, transparent 35%),
        var(--bg);
      color: var(--ink);
      display: flex;
      justify-content: center;
      padding: 14px;
    }

    .app {
      width: min(460px, 100%);
      display: grid;
      gap: 12px;
      padding-bottom: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; margin-bottom: 8px; }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .pill {
      padding: 6px 10px;
      background: #f3e9d9;
      border-radius: 999px;
      border: 1px solid #e9d5b8;
    }

    .character-wrap {
      text-align: center;
      padding: 14px;
      border-radius: 14px;
      border: 1px dashed #d8bf99;
      background: linear-gradient(180deg, #f6ecd9, #fef8ea);
    }

    .character {
      display: inline-block;
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      background-repeat: no-repeat;
      background-position: 0 0;
    }

    @keyframes idle {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-5px) rotate(2deg); }
    }

    @keyframes farm {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-7px) rotate(-6deg); }
      75% { transform: translateY(-3px) rotate(6deg); }
    }

    @keyframes rest {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      border: 1px solid #d8c4a4;
      border-radius: 12px;
      padding: 10px;
      font-size: 1rem;
      background: #fffdf8;
      color: var(--ink);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 12px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
    }

    button.secondary { background: var(--accent-2); }
    button.ghost {
      color: var(--ink);
      background: #f2e5cf;
      border: 1px solid #ddc39c;
    }
    button.warn { background: var(--danger); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .actions {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .timer {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-align: center;
      margin: 10px 0;
    }

    .muted { color: var(--muted); font-size: 0.9rem; }
    /* Must win over component display rules (e.g. .walkthrough { display:grid }). */
    .hidden { display: none !important; }

    .walkthrough {
      position: fixed;
      inset: 0;
      background: rgba(33, 24, 14, 0.62);
      display: grid;
      place-items: center;
      z-index: 20;
      padding: 14px;
    }

    .walkthrough-box {
      width: min(430px, 100%);
      background: #fffaf2;
      border-radius: 18px;
      border: 1px solid #eddabf;
      padding: 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card top">
      <h1>Focus Farmer</h1>
      <div class="stats">
        <span class="pill" id="coins-pill">Coins: 0</span>
        <span class="pill" id="streak-pill">Sessions: 0</span>
      </div>
    </section>

    <section class="card" id="focus-setup-screen">
      <h2>FOCUS Page</h2>
      <p class="muted">Set your session, then FARM to begin deep work.</p>
      <div class="character-wrap" style="margin-top:10px;">
        <div class="character" id="setup-character"></div>
        <p class="muted" style="margin-top:6px;">Your farmer is ready.</p>
      </div>

      <div class="form-grid" style="margin-top:10px;">
        <label>
          Focus timer (minutes)
          <input id="focus-minutes" type="number" min="1" max="180" value="25" />
        </label>

        <label>
          Timer style
          <select id="timer-style">
            <option value="down">Count down</option>
            <option value="up">Count up</option>
          </select>
        </label>

        <label>
          Mode
          <select id="mode-style">
            <option value="regular">Regular</option>
            <option value="hard">Hard Mode (higher rewards)</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button id="farm-btn">FARM (start focus)</button>
      </div>
    </section>

    <section class="card hidden" id="focus-run-screen">
      <h2>Focus Session</h2>
      <p class="muted" id="focus-mode-text"></p>
      <div class="character-wrap" style="margin-top:10px;">
        <div class="character" id="focus-character"></div>
        <p class="muted" id="focus-status" style="margin-top:6px;">Farming in progress...</p>
      </div>
      <div class="timer" id="focus-timer">00:00</div>
      <div class="actions">
        <button class="warn" id="reap-btn" disabled>REAP (end focus)</button>
      </div>
    </section>

    <section class="card hidden" id="summary-screen">
      <h2>Harvest Summary</h2>
      <p class="muted" id="summary-text"></p>
      <div class="actions">
        <button class="secondary" id="rest-btn">REST</button>
      </div>
    </section>

    <section class="card hidden" id="rest-screen">
      <h2>Rest Grove</h2>
      <p class="muted">Use your break to reset your attention.</p>
      <div class="character-wrap" style="margin-top:10px;">
        <div class="character" id="rest-character"></div>
        <p class="muted" id="rest-status" style="margin-top:6px;">Short rest available.</p>
      </div>

      <div class="form-grid" style="margin-top:10px;">
        <label>
          Break timer (minutes)
          <input id="break-minutes" type="number" min="1" max="60" value="5" />
        </label>
      </div>

      <div class="timer" id="rest-timer">00:00</div>

      <div class="actions">
        <button id="start-rest-btn">Start Break</button>
        <button class="ghost" id="advice-btn">Get Focus Advice</button>
        <button class="ghost" id="joke-btn">Hear Farm Joke</button>
        <button class="ghost" id="island-btn">Check Island</button>
        <button class="secondary" id="back-to-focus-btn">Back to Focus</button>
      </div>
      <p class="muted" id="dialogue-output" style="margin-top:10px;"></p>
    </section>
  </main>

  <div class="walkthrough" id="walkthrough">
    <div class="walkthrough-box">
      <h3 id="walkthrough-title">Welcome to Focus Farmer</h3>
      <p id="walkthrough-body"></p>
      <button id="walkthrough-next">Next</button>
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
